<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offshore Wind Re-planner</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>Offshore Wind Re-planner</h1>
                <p>Optimize maintenance schedules when breakdowns occur</p>
            </div>
            <img src="visuals/sentinel_orchestrator.png" alt="Sentinel Orchestrator" 
                 style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; 
                        box-shadow: 0 0 15px rgba(90, 173, 224, 0.4); margin-top: -15px; margin-bottom: -15px;">
        </header>

        <div class="controls" style="flex-direction: column; gap: 15px; text-align: left;">
            <div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; text-align: left;">
                <div class="control-group">
                    <label for="penalty-input">Overdue Penalty per Day (€):</label>
                    <input type="number" id="penalty-input" value="3000" step="100">
                </div>
                <div class="control-group">
                    <label for="overtime-cost-input">Overtime Cost per Hour (€):</label>
                    <input type="number" id="overtime-cost-input" value="500" step="50">
                </div>
            </div>
            <div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; text-align: left;">
                <div class="control-group">
                    <label for="spill-over-routine-input">Spill Over Penalty - Preventive (€):</label>
                    <input type="number" id="spill-over-routine-input" value="5000" step="500">
                </div>
                <div class="control-group">
                    <label for="spill-over-repairs-input">Spill Over Penalty - Corrective (€):</label>
                    <input type="number" id="spill-over-repairs-input" value="10000" step="500">
                </div>
                <div class="control-group">
                    <button id="replan-btn">Re-plan Schedule</button>
                </div>
            </div>
        </div>

        <div class="info-panel">
            <div id="breakdown-info" class="breakdown-info"></div>
            <div id="revenue-info" class="revenue-info"></div>
        </div>

        <div class="schedule-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0;">Schedule Timeline</h2>
                <div class="schedule-toggle" style="display: flex; gap: 10px; align-items: center;">
                    <button id="view-original-btn" class="toggle-btn active">Original</button>
                    <button id="view-optimized-btn" class="toggle-btn" disabled>Optimized</button>
                </div>
            </div>
            <div id="schedule-viewer"></div>
        </div>

    </div>

    <script src="js/api-client.js"></script>
    <script src="js/schedule-viewer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
